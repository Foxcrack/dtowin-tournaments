<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinculando Discord...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0042ff, #ff3000);
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="text-center">
        <div class="spinner mx-auto mb-4"></div>
        <p class="text-white text-lg font-semibold">Verificando tu cuenta de Discord...</p>
        <p id="status" class="text-gray-100 text-sm mt-2">Por favor espera</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.19.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.19.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.19.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBHW2HsP2T6DOwLaOYloqZFerFmU_UA4kE",
            authDomain: "dtowin-tournament.firebaseapp.com",
            projectId: "dtowin-tournament",
            storageBucket: "dtowin-tournament.appspot.com",
            messagingSenderId: "991226820083",
            appId: "1:991226820083:web:6387773cf8c76a0f6ace86",
            measurementId: "G-R4Q5YKZXGY"
        };

        firebase.initializeApp(firebaseConfig);
    </script>

    <script type="module">
        import { validateOAuthState, exchangeCodeForUserInfo } from './discord-config.js';

        async function waitForAuthenticatedUser(timeoutMs = 10000) {
            const auth = firebase.auth();

            if (auth.currentUser) {
                return auth.currentUser;
            }

            return new Promise((resolve, reject) => {
                let unsubscribe = null;

                const timeoutId = setTimeout(() => {
                    if (unsubscribe) {
                        unsubscribe();
                    }
                    reject(new Error('No se encontro usuario autenticado'));
                }, timeoutMs);

                unsubscribe = auth.onAuthStateChanged((user) => {
                    if (!user) {
                        return;
                    }

                    clearTimeout(timeoutId);
                    unsubscribe();
                    resolve(user);
                }, (error) => {
                    clearTimeout(timeoutId);
                    if (unsubscribe) {
                        unsubscribe();
                    }
                    reject(error);
                });
            });
        }

        async function handleDiscordCallback() {
            try {
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                const state = params.get('state');
                const error = params.get('error');
                const statusEl = document.getElementById('status');

                if (error) {
                    statusEl.textContent = `Error: ${error}`;
                    setTimeout(() => {
                        window.location.href = 'perfil.html';
                    }, 2000);
                    return;
                }

                if (!code) {
                    statusEl.textContent = 'Error: No se recibio codigo de autorizacion';
                    setTimeout(() => {
                        window.location.href = 'perfil.html';
                    }, 2000);
                    return;
                }

                if (!validateOAuthState(state)) {
                    statusEl.textContent = 'Error: Validacion de seguridad fallida';
                    setTimeout(() => {
                        window.location.href = 'perfil.html';
                    }, 2000);
                    return;
                }

                statusEl.textContent = 'Intercambiando codigo...';
                const discordUserInfo = await exchangeCodeForUserInfo(code);

                if (!discordUserInfo || !discordUserInfo.id) {
                    throw new Error('No se pudo obtener informacion de Discord');
                }

                statusEl.textContent = 'Guardando informacion de Discord...';

                try {
                    await firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                } catch (persistenceError) {
                    console.warn('No se pudo establecer persistencia local:', persistenceError);
                }

                const currentUser = await waitForAuthenticatedUser();
                const pendingUid = sessionStorage.getItem('discord_oauth_pending_uid');

                if (pendingUid && pendingUid !== currentUser.uid) {
                    throw new Error('La sesion recuperada no coincide con el usuario que inicio la vinculacion');
                }

                const usersRef = firebase.firestore().collection("usuarios");
                const userQuery = await usersRef.where("uid", "==", currentUser.uid).get();

                if (userQuery.empty) {
                    throw new Error('Perfil de usuario no encontrado');
                }

                const userDoc = userQuery.docs[0];
                await userDoc.ref.update({
                    discord: {
                        id: discordUserInfo.id,
                        username: discordUserInfo.username,
                        avatar: discordUserInfo.avatar,
                        discriminator: discordUserInfo.discriminator,
                        connectedAt: firebase.firestore.FieldValue.serverTimestamp()
                    },
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                sessionStorage.removeItem('discord_oauth_pending_uid');
                statusEl.textContent = 'Exito! Redirigiendo...';

                setTimeout(() => {
                    window.location.href = 'perfil.html';
                }, 1000);
            } catch (error) {
                console.error('Error en callback:', error);
                const statusEl = document.getElementById('status');
                statusEl.textContent = `Error: ${error.message}`;
                statusEl.classList.add('text-red-300');

                setTimeout(() => {
                    window.location.href = 'perfil.html';
                }, 3000);
            }
        }

        handleDiscordCallback();
    </script>
</body>
</html>
