[build]
  # No build command needed - serve static files as-is
  command = ""
  publish = "."

# Configure Netlify Functions
[functions]
  directory = "api"

# Environment variables
[build.environment]
  NODE_VERSION = "18"

# Security: Configure secrets scanning
[build.processing.security]
  # Scan for secrets by default, but omit markdown documentation files
  omitPaths = ["*.md", "FIREBASE-*", "DISCORD-*", "SOLUCION-*", "SETUP-*"]

# Redirects for API
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
